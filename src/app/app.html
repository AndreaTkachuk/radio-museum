<!-- 
  Contenitore principale dell'applicazione (Root Component)
  Contiene: navigazione, contenuto principale e footer
-->
<div class="min-h-screen flex flex-col">
  <!-- 
    BARRA DI NAVIGAZIONE
    - Logo e nome dell'applicazione
    - Link principali del menu (Home, Galleria, Admin)
    - Selettore lingua (Italiano, Inglese)
  -->
  <nav class="bg-gray-800 text-white shadow-lg sticky top-0 z-50">
    <div class="container mx-auto px-4 py-4 flex justify-between items-center">
      <!-- Logo e nome dell'applicazione -->
      <div class="text-2xl font-bold">
        {{ title() }}
      </div>

      <!-- Menu di navigazione e selettore lingua -->
      <div class="flex gap-4 md:gap-8 items-center">
        <!-- Link principali di navigazione -->
        <a href="/" class="hover:text-amber-400 transition font-semibold">
          Home
        </a>
        <a href="/gallery" class="hover:text-amber-400 transition font-semibold">
          Galleria
        </a>
        <a href="/admin" class="hover:text-amber-400 transition font-semibold">
          Admin
        </a>

        <!-- Separatore (linea verticale) -->
        <div class="h-6 w-px bg-gray-600"></div>

        <!-- Selettore lingua con due pulsanti -->
        <div class="flex gap-2">

          <!-- Pulsante per la lingua italiana -->
          <button
            (click)="changeLanguage('it')"
            [class.bg-amber-600]="getCurrentLanguage() === 'it'"
            [class.bg-gray-700]="getCurrentLanguage() !== 'it'"
            class="px-3 py-1 rounded transition text-sm font-semibold"
            title="Lingua italiana"
          >
            🇮🇹 IT
          </button>

          <!-- Pulsante per la lingua inglese -->
          <button
            (click)="changeLanguage('en')"
            [class.bg-amber-600]="getCurrentLanguage() === 'en'"
            [class.bg-gray-700]="getCurrentLanguage() !== 'en'"
            class="px-3 py-1 rounded transition text-sm font-semibold"
            title="English language"
          >
            🇬🇧 EN
          </button>
        </div>
      </div>
    </div>
  </nav>

  <!-- 
    CONTENUTO PRINCIPALE (MAIN)
    - Punto di inserimento dinamico per i componenti basati sulle rotte
    - Componenti: HomeComponent, GalleryComponent, AdminComponent
  -->
  <main class="flex-1">
    <router-outlet></router-outlet>
  </main>

  <!-- 
    FOOTER
    - Informazioni sul copyright
    - Informazioni sulla tecnologia utilizzata (Angular)
  -->
  <footer class="bg-gray-800 text-white py-8 mt-12">
    <div class="container mx-auto px-4 text-center">
      <!-- Informazioni copyright -->
      <p class="text-gray-400">
        © 2026 Museo della Radio. Tutti i diritti riservati.
      </p>
      
      <!-- Informazioni tecniche -->
      <p class="text-gray-500 text-sm mt-2">
        Sviluppato con ❤️ usando Angular {{ title() }}
      </p>
    </div>
  </footer>
</div>
